<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Box</title>
  <style>
    :root{
      --bg: rgba(8, 8, 10, 0.42);
      --panel: rgba(24, 24, 28, 0.72);
      --panel-2: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f4f4f5;
      --muted: #b7b7bd;
      --red: #e5484d;
      --red-2: #ff6268;
      --red-3: #b92f35;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
    }

    *{ box-sizing:border-box; }
    html, body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      background:transparent;
      font-family:"Segoe UI", system-ui, -apple-system, Arial, sans-serif;
      color:var(--text);
    }

    .overlay{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:var(--bg);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding:24px;
    }

    .overlay.show{ display:flex; }

    .box{
      width:min(520px, 100%);
      border-radius:28px;
      background:linear-gradient(180deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,.03) 100%);
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      overflow:hidden;
      position:relative;
    }

    .box::after{
      content:"";
      position:absolute;
      inset:auto -80px -90px auto;
      width:260px;
      height:260px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(229,72,77,.18) 0%, rgba(229,72,77,0) 70%);
      pointer-events:none;
    }

    .head{
      padding:22px 22px 14px;
      display:flex;
      align-items:flex-start;
      gap:14px;
      position:relative;
      z-index:1;
    }

    .icon{
      width:auto;
      height:auto;
      padding:0;
      border-radius:0;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
      background:transparent;
      box-shadow:none;
      font-size:30px;
      font-weight:900;
      line-height:1;
      color:#ff6b6b;
      text-shadow:0 0 14px rgba(229,72,77,.18);
    }

    .titles{
      min-width:0;
      flex:1;
    }

    .title{
      margin:2px 0 6px;
      font-size:22px;
      line-height:1.2;
      font-weight:900;
      letter-spacing:-.2px;
    }

    .subtitle{
      margin:0;
      color:var(--muted);
      font-size:13px;
      line-height:1.7;
    }

    .body{
      padding:0 22px 18px;
      position:relative;
      z-index:1;
    }

    .message{
      padding:16px;
      border-radius:18px;
      background:var(--panel-2);
      border:1px solid rgba(255,255,255,.06);
      color:var(--text);
      font-size:14px;
      line-height:1.8;
      word-break:break-word;
      white-space:pre-wrap;
      margin-bottom:14px;
    }

    .order-summary{
      display:grid;
      gap:10px;
      padding:16px;
      border-radius:18px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
      margin-bottom:14px;
    }

    .summary-row{
      color:var(--muted);
      font-size:13px;
      line-height:1.7;
      white-space:pre-wrap;
    }

    .form-label{
      display:block;
      margin:0 0 8px;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }

    .form-input{
      width:100%;
      border:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.06);
      color:var(--text);
      border-radius:16px;
      padding:13px 14px;
      font-size:15px;
      outline:none;
      margin-bottom:14px;
    }

    .form-input:focus{
      border-color:rgba(229,72,77,.78);
      box-shadow:0 0 0 4px rgba(229,72,77,.14);
      background:rgba(255,255,255,.08);
    }

    .footer{
      padding:0 22px 22px;
      display:flex;
      justify-content:flex-end;
      gap:10px;
      position:relative;
      z-index:1;
    }

    .btn{
      border:0;
      border-radius:16px;
      padding:12px 18px;
      min-width:110px;
      background:linear-gradient(180deg, var(--red-2) 0%, var(--red-3) 100%);
      color:#fff;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 14px 30px rgba(229,72,77,.22);
      transition:transform .15s ease, filter .15s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.06);
    }

    .btn-secondary{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.1);
      color:var(--text);
      box-shadow:none;
    }

    .variant-warning .icon{ color:#ff6b6b; }
    .variant-info .icon{ color:#8bb8ff; }
    .variant-success .icon{ color:#86efac; }

    .hidden{ display:none !important; }
  </style>
</head>
<body>
  <div id="overlay" class="overlay">
    <div id="box" class="box variant-warning">
      <div class="head">
        <div id="icon" class="icon">⚠</div>
        <div class="titles">
          <h2 id="title" class="title">Message</h2>
          <p id="subtitle" class="subtitle">Please review the following message.</p>
        </div>
      </div>

      <div class="body">
        <div id="message" class="message"></div>

        <div id="orderFormWrap" class="hidden">
          <div id="orderSummary" class="order-summary"></div>

          <label class="form-label" for="imeiInput">IMEI / Serial</label>
          <input id="imeiInput" class="form-input" type="text" placeholder="Enter IMEI / Serial" />
        </div>

        <div id="fundFormWrap" class="hidden">
          <div id="fundSummary" class="order-summary"></div>

          <label class="form-label" for="fundAmountInput">Amount</label>
          <input id="fundAmountInput" class="form-input" type="number" min="1" step="1" placeholder="Enter amount" />
        </div>
      </div>

      <div class="footer">
        <button id="secondaryBtn" class="btn btn-secondary hidden" type="button">Cancel</button>
        <button id="okBtn" class="btn" type="button">OK</button>
      </div>
    </div>
  </div>

  <script>
    const overlay = document.getElementById("overlay");
    const box = document.getElementById("box");
    const icon = document.getElementById("icon");
    const titleEl = document.getElementById("title");
    const subtitleEl = document.getElementById("subtitle");
    const messageEl = document.getElementById("message");
    const okBtn = document.getElementById("okBtn");
    const secondaryBtn = document.getElementById("secondaryBtn");
    const orderFormWrap = document.getElementById("orderFormWrap");
    const orderSummary = document.getElementById("orderSummary");
    const imeiInput = document.getElementById("imeiInput");
    const fundFormWrap = document.getElementById("fundFormWrap");
    const fundSummary = document.getElementById("fundSummary");
    const fundAmountInput = document.getElementById("fundAmountInput");

    let currentPayload = null;
    let onCloseCallback = null;

    function applyVariant(variant) {
      box.classList.remove("variant-warning", "variant-info", "variant-success");

      if (variant === "info") {
        box.classList.add("variant-info");
        icon.textContent = "i";
      } else if (variant === "success") {
        box.classList.add("variant-success");
        icon.textContent = "✓";
      } else {
        box.classList.add("variant-warning");
        icon.textContent = "⚠";
      }
    }

    function closeBox() {
      overlay.classList.remove("show");
      currentPayload = null;
      onCloseCallback = null;

      try {
        window.parent.postMessage({ type: "MB_CLOSED" }, "*");
      } catch {}
    }

    function openBox(payload = {}) {
      currentPayload = payload;

      const title = payload.title || "Message";
      const message = payload.message || "";
      const subtitle = payload.subtitle || "Please review the following message.";
      const variant = payload.variant || "warning";
      const callback = typeof payload.onClose === "function" ? payload.onClose : null;

      titleEl.textContent = title;
      subtitleEl.textContent = subtitle;
      messageEl.textContent = message;
      applyVariant(variant);
      onCloseCallback = callback;

      orderFormWrap.classList.add("hidden");
      fundFormWrap.classList.add("hidden");
      okBtn.classList.remove("hidden");
      secondaryBtn.classList.add("hidden");
      okBtn.textContent = "OK";

      if (payload.mode === "order-form") {
        orderFormWrap.classList.remove("hidden");
        okBtn.textContent = "Order";
        secondaryBtn.classList.remove("hidden");
        secondaryBtn.textContent = "Cancel";

        const d = payload.data || {};
        orderSummary.innerHTML = `
          <div class="summary-row"><strong>Category:</strong> ${d.categoryName || "-"}</div>
          <div class="summary-row"><strong>Order:</strong> ${d.orderName || "-"}</div>
          <div class="summary-row"><strong>Price:</strong> ${d.price != null ? d.price : "-"}</div>
          <div class="summary-row"><strong>Period:</strong> ${d.period || "-"}</div>
          <div class="summary-row"><strong>Description:</strong> ${d.bio || "-"}</div>
        `;
        imeiInput.value = "";
        setTimeout(() => imeiInput.focus(), 50);
      }

      if (payload.mode === "fund-form") {
        fundFormWrap.classList.remove("hidden");
        okBtn.textContent = "Fund";
        secondaryBtn.classList.remove("hidden");
        secondaryBtn.textContent = "Cancel";

        const d = payload.data || {};
        fundSummary.innerHTML = `
          <div class="summary-row"><strong>Destination:</strong> 01035074563</div>
          <div class="summary-row"><strong>Current Balance:</strong> ${d.balance != null ? d.balance : "-"}</div>
          <div class="summary-row"><strong>Requested Status:</strong> Under review</div>
          <div class="summary-row"><strong>Note:</strong> The request will be reviewed by admin before the balance is added.</div>
        `;
        fundAmountInput.value = "";
        setTimeout(() => fundAmountInput.focus(), 50);
      }

      overlay.classList.add("show");
    }

    okBtn.addEventListener("click", () => {
      if (currentPayload && currentPayload.mode === "order-form") {
        const serial = imeiInput.value.trim();
        if (!serial) {
          messageEl.textContent = "IMEI / Serial is required.";
          return;
        }

        try {
          window.parent.postMessage({
            type: "MB_ACTION",
            action: "order-confirm",
            payload: {
              imeiSerial: serial,
              data: currentPayload.data || {}
            }
          }, "*");
        } catch {}

        closeBox();
        return;
      }

      if (currentPayload && currentPayload.mode === "fund-form") {
        const amount = Number(fundAmountInput.value);
        if (!amount || amount <= 0) {
          messageEl.textContent = "Amount is required.";
          return;
        }

        try {
          window.parent.postMessage({
            type: "MB_ACTION",
            action: "fund-confirm",
            payload: {
              fundAmount: amount,
              data: currentPayload.data || {}
            }
          }, "*");
        } catch {}

        closeBox();
        return;
      }

      closeBox();
    });

    secondaryBtn.addEventListener("click", () => {
      closeBox();
    });

    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) closeBox();
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && overlay.classList.contains("show")) {
        closeBox();
      }
    });

    window.addEventListener("message", (event) => {
      const data = event.data || {};
      if (data.type === "MB_SHOW") openBox(data.payload || data);
      if (data.type === "MB_HIDE") closeBox();
    });

    try {
      window.parent.postMessage({ type: "MB_READY" }, "*");
    } catch {}
  </script>
</body>
</html>
