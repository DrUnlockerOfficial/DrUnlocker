<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders</title>
  <style>
    :root{
      --bg0:#050506;
      --bg1:#0c0c0f;
      --panel:rgba(18,18,21,.84);
      --panel-2:rgba(36,36,40,.96);
      --panel-3:rgba(255,255,255,.03);
      --border:rgba(255,255,255,.08);
      --text:#f5f5f7;
      --muted:#b1b1ba;
      --muted-2:#8e8e98;
      --shadow:0 24px 70px rgba(0,0,0,.46);
      --radius:24px;
      --radius-lg:30px;
      --accent:#e8e8ea;
      --accent-2:#d7d7da;
    }

    *{ box-sizing:border-box; }
    html,body{ min-height:100%; }
    body{
      margin:0;
      padding:24px;
      color:var(--text);
      font-family:"Segoe UI", system-ui, -apple-system, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.06), transparent 18%),
        radial-gradient(circle at top right, rgba(255,255,255,.045), transparent 14%),
        radial-gradient(circle at bottom left, rgba(255,255,255,.03), transparent 22%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg0) 100%);
      overflow-y:auto;
    }

    *{ scrollbar-width:thin; scrollbar-color:rgba(255,255,255,.18) transparent; }
    ::-webkit-scrollbar{ width:10px; height:10px; }
    ::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.14); border-radius:999px; border:2px solid transparent; background-clip:padding-box; }

    .page{
      min-height:calc(100vh - 48px);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .card{
      width:min(1060px, 100%);
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:34px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(22px);
      -webkit-backdrop-filter:blur(22px);
      padding:22px;
      overflow:hidden;
    }

    .nav-bar{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
      border-radius:24px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
      margin-bottom:18px;
    }

    .nav-links{
      width:100%;
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .nav-btn{
      appearance:none;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      color:var(--muted);
      border-radius:16px;
      height:46px;
      min-width:110px;
      padding:0 18px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      font-weight:800;
      line-height:1;
      cursor:pointer;
      transition:transform .15s ease, background .18s ease, border-color .18s ease, color .18s ease, box-shadow .18s ease, filter .18s ease;
      text-decoration:none;
    }

    .nav-btn:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.07);
      border-color:rgba(255,255,255,.14);
      color:#fff;
      filter:brightness(1.04);
    }

    .nav-btn.active{
      background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.09));
      color:#fff;
      border-color:rgba(255,255,255,.18);
      box-shadow:0 10px 24px rgba(0,0,0,.22);
    }

    .orders-shell{
      background:rgba(255,255,255,.025);
      border:1px solid rgba(255,255,255,.06);
      border-radius:28px;
      padding:18px;
    }

    .orders-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:22px;
    }

    .category-block{
      background:rgba(0,0,0,.14);
      border:1px solid rgba(255,255,255,.06);
      border-radius:30px;
      padding:24px 18px 18px;
      overflow:hidden;
    }

    .category-title{
      margin:0 0 32px;
      font-size:clamp(28px, 4.6vw, 54px);
      line-height:1.04;
      font-weight:900;
      letter-spacing:-.03em;
      text-transform:uppercase;
    }

    .section-label{
      margin:0 0 28px;
      color:#bdbdc6;
      font-size:clamp(18px, 2vw, 22px);
      font-weight:800;
      letter-spacing:.05em;
      text-transform:uppercase;
    }

    .orders-list{
      display:grid;
      grid-template-columns:1fr;
      gap:18px;
    }

    .order-card{
      background:var(--panel-2);
      border:1px solid rgba(255,255,255,.07);
      border-radius:28px;
      padding:28px 28px 24px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
    }

    .order-name{
      margin:0 0 28px;
      font-size:clamp(22px, 2.9vw, 36px);
      line-height:1.18;
      font-weight:800;
      letter-spacing:-.02em;
      color:#f3f3f5;
      white-space:normal;
      overflow-wrap:anywhere;
    }

    .order-price{
      margin:0 0 18px;
      font-size:clamp(24px, 3.8vw, 44px);
      line-height:1;
      font-weight:900;
      color:#fafafa;
    }

    .order-bio{
      margin:0;
      color:#b4b4bc;
      font-size:clamp(17px, 2vw, 23px);
      line-height:1.65;
      white-space:pre-wrap;
      overflow-wrap:anywhere;
    }

    .empty-state{
      padding:24px;
      border-radius:22px;
      border:1px dashed rgba(255,255,255,.14);
      background:rgba(255,255,255,.03);
      color:var(--muted);
      font-size:16px;
      line-height:1.7;
    }

    @media (max-width:720px){
      body{ padding:16px; }
      .page{ align-items:flex-start; }
      .card{ width:100%; padding:14px; border-radius:26px; }
      .nav-bar{ padding:12px; }
      .nav-links{ gap:8px; }
      .nav-btn{ height:44px; min-width:0; flex:1 1 calc(50% - 8px); font-size:12px; padding:0 10px; }
      .orders-shell{ padding:14px; border-radius:24px; }
      .category-block{ padding:18px 12px 12px; border-radius:24px; }
      .order-card{ padding:22px 18px 18px; border-radius:22px; }
      .order-name{ margin-bottom:22px; }
      .order-price{ margin-bottom:14px; }
      .section-label{ margin-bottom:20px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <header class="nav-bar">
        <nav class="nav-links">
          <a class="nav-btn" href="home.html">Home</a>
          <a class="nav-btn active" href="order.html">Orders</a>
          <a class="nav-btn" href="profile.html">Profile</a>
          <a class="nav-btn" href="about.html">About</a>
        </nav>
      </header>

      <main class="orders-shell">
        <div id="ordersRoot" class="orders-grid">
          <div class="empty-state">Loading orders...</div>
        </div>
      </main>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCwAX2A35nYps1T4f30_lurNh_7SzL8by8",
      authDomain: "dr-unlocker.firebaseapp.com",
      projectId: "dr-unlocker",
      storageBucket: "dr-unlocker.firebasestorage.app",
      messagingSenderId: "783882145882",
      appId: "1:783882145882:web:64f34098b501f6e9da8863",
      measurementId: "G-HTC5C0F929",
      databaseURL: "https://dr-unlocker-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const ordersRoot = document.getElementById("ordersRoot");
    const ordersRef = ref(db, "orders/categories");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function toNumber(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }

    function orderEntries(obj) {
      return Object.entries(obj || {}).sort((a, b) => {
        const aTime = toNumber(a[1]?.createdAt) ?? 0;
        const bTime = toNumber(b[1]?.createdAt) ?? 0;
        if (aTime !== bTime) return aTime - bTime;
        return String(a[0]).localeCompare(String(b[0]), "en");
      });
    }

    function categoryEntries(obj) {
      return Object.entries(obj || {}).sort((a, b) => {
        const aTime = toNumber(a[1]?.createdAt) ?? 0;
        const bTime = toNumber(b[1]?.createdAt) ?? 0;
        if (aTime !== bTime) return aTime - bTime;
        return String(a[1]?.name || a[0]).localeCompare(String(b[1]?.name || b[0]), "en");
      });
    }

    function render(data) {
      const categories = categoryEntries(data);

      if (!categories.length) {
        ordersRoot.innerHTML = '<div class="empty-state">No orders categories found in RTDB.</div>';
        return;
      }

      ordersRoot.innerHTML = categories.map(([categoryId, category]) => {
        const categoryName = escapeHtml(category?.name || categoryId);
        const orders = orderEntries(category?.orders);

        if (!orders.length) {
          return `
            <section class="category-block">
              <h1 class="category-title">${categoryName}</h1>
              <div class="section-label">PRICE</div>
              <div class="empty-state">No orders inside this category yet.</div>
            </section>
          `;
        }

        return `
          <section class="category-block">
            <h1 class="category-title">${categoryName}</h1>
            <div class="section-label">PRICE</div>
            <div class="orders-list">
              ${orders.map(([orderId, order]) => {
                const name = escapeHtml(order?.name || orderId);
                const priceRaw = order?.price ?? "";
                const priceText = priceRaw === "" ? "" : `$ ${escapeHtml(priceRaw)}`;
                const bio = escapeHtml(order?.bio || "");
                return `
                  <article class="order-card">
                    <h2 class="order-name">${name}</h2>
                    <div class="order-price">${priceText}</div>
                    <p class="order-bio">${bio}</p>
                  </article>
                `;
              }).join("")}
            </div>
          </section>
        `;
      }).join("");
    }

    onValue(ordersRef, (snapshot) => {
      render(snapshot.val() || {});
    }, (error) => {
      ordersRoot.innerHTML = `<div class="empty-state">Failed to load orders: ${escapeHtml(error.message)}</div>`;
    });
  </script>
</body>
</html>
