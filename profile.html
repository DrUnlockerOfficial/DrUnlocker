<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="profile">
  <iframe id="messageBoxFrame" src="message_box.html"></iframe>

  <div class="page">
    <div class="card">
      <header class="nav-bar">
        <nav class="nav-links" aria-label="Home navigation">
          <a class="nav-btn" data-page="home" href="home.html">Home</a>
          <a class="nav-btn" data-page="order" href="order.html">Order</a>
          <a class="nav-btn" data-page="profile" href="profile.html">Profile</a>
          <a class="nav-btn" data-page="about" href="about.html">About</a>
        </nav>
      </header>

      <main class="content one-col">

        <section class="panel">
          <h1 class="section-title" id="welcomeTitle">Profile</h1>
          <p class="subtitle" id="welcomeSubtitle">Loading account information...</p>

          <div class="meta three">
            <div class="meta-box">
              <div class="meta-title">Balance</div>
              <div class="meta-value" id="balanceText">-</div>
            </div>

            <div class="meta-box">
              <div class="meta-title">Email</div>
              <div class="meta-value" id="emailText">-</div>
            </div>

            <div class="meta-box">
              <div class="meta-title">UID</div>
              <div class="meta-value" id="uidText">-</div>
            </div>
          </div>

          <button id="logoutBtn" class="btn" type="button">Sign Out</button>
        </section>
      </main>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
