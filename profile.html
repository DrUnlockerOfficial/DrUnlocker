<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>
  <style>
    /* نفس الستايل الموجود في home.html */
    :root{
      --bg0:#070708; --bg1:#0d0d10; --panel:rgba(24,24,28,.72); --panel-2:rgba(255,255,255,.04);
      --border:rgba(255,255,255,.08); --text:#f4f4f5; --muted:#b7b7bd; --muted-2:#8d8d96;
      --red:#e5484d; --red-2:#ff6268; --red-3:#b92f35; --shadow:0 24px 70px rgba(0,0,0,.45); --radius:22px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; min-height:100vh; font-family:"Segoe UI", system-ui, -apple-system, Arial, sans-serif; color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(229,72,77,.18), transparent 28%),
        radial-gradient(circle at top right, rgba(255,98,104,.08), transparent 18%),
        radial-gradient(circle at bottom left, rgba(229,72,77,.08), transparent 24%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg0) 100%);
      direction:ltr; padding:24px; overflow-y:auto;
    }
    .page{ min-height:calc(100vh - 48px); display:flex; align-items:center; justify-content:center; }
    .card{ width:min(980px, 100%); background:var(--panel); border:1px solid var(--border); border-radius:28px; box-shadow:var(--shadow); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding:22px; position:relative; overflow:hidden; }
    .nav-bar{ position:relative; z-index:1; display:flex; align-items:center; justify-content:center; gap:16px; flex-wrap:wrap; margin-bottom:18px; padding:14px; border-radius:22px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06); }
    .nav-links{ width:100%; display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap; }
    .nav-btn{ appearance:none; border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.04); color:var(--muted); border-radius:16px; height:46px; min-width:110px; padding:0 18px; display:inline-flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; line-height:1; cursor:pointer; transition:transform .15s ease, background .18s ease, border-color .18s ease, color .18s ease, box-shadow .18s ease, filter .18s ease; text-decoration:none; }
    .nav-btn:hover{ transform:translateY(-1px); background:rgba(229,72,77,.12); border-color:rgba(229,72,77,.26); color:#fff; filter:brightness(1.04); }
    .nav-btn.active{ background:linear-gradient(180deg, var(--red-2) 0%, var(--red-3) 100%); color:#fff; border-color:rgba(229,72,77,.38); box-shadow:0 12px 26px rgba(229,72,77,.22); }
    .panel{ background:var(--panel-2); border:1px solid rgba(255,255,255,.06); border-radius:22px; padding:20px; }
    .placeholder{ padding:18px; border-radius:18px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06); color:var(--muted); line-height:1.8; font-size:14px; }
    .section-title{ margin:0 0 10px; font-size:28px; line-height:1.1; }
    .content{ position:relative; z-index:1; display:grid; grid-template-columns:1fr; gap:16px; }
    @media (max-width:720px){
      body{ padding:16px; } .page{ align-items:flex-start; } .card{ width:100%; padding:14px; border-radius:24px; } .nav-bar{ padding:12px; } .nav-links{ gap:8px; } .nav-btn{ height:44px; min-width:0; flex:1 1 calc(50% - 8px); font-size:12px; padding:0 10px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <header class="nav-bar">
        <nav class="nav-links">
          <a class="nav-btn" href="home.html">Home</a>
          <a class="nav-btn" href="order.html">Order</a>
          <a class="nav-btn active" href="profile.html">Profile</a>
          <a class="nav-btn" href="about.html">About</a>
        </nav>
      </header>

      <main class="content">
        <section class="panel">
          <h1 class="section-title">Profile</h1>
          <div class="placeholder">Profile section placeholder. Put balance, account status, registration date, and user controls here.</div>
        </section>
      </main>
    </div>
  </div>
</body>
</html>
